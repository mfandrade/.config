unbind r
bind r "source-file ~/.config/tmux/tmux.conf; display-message 'tmux.conf reloaded'"

# better prefix
unbind C-b
set -g prefix \'
unbind Space
bind Space send-prefix

# shell
set -g default-shell $SHELL

# preserve a way to clear the screen
bind -n C-M-l send-keys 'C-l'

# 1-based indexing
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# modern terminal integration
set -g focus-events on
set -g extended-keys on
set -g default-terminal "tmux-256color"
set -as terminal-features ',xterm*:RGB:focus:hyperlinks:extkeys:strikethrough'

# style
char_session="  "
char_zoom="▇"
char_sync="#"
char_bell="●"
char_active="·"
char_inactive=" "
name_session="[#S]"
name_window="#I:#W"

# status Wbar
bind a set -g status

set -g status-position top
set -g status-left-length 30
set -g status-right-length 80

set -g status-left "#[bg=color240,fg=color15,bold]$char_session#{server_sessions} $name_session #[bg=color16,fg=color240,nobold] "

set -g status-style bg=color16,fg=color240
set -g message-style bg=color240,fg=color15,bright
set -g mode-style fg=color15,bg=color240

set -g monitor-activity on
set -g monitor-bell on
set -g bell-action other
set -g window-status-bell-style fg=color166,nobold
set -g window-status-style bg=color16,fg=color240
set -g window-status-activity-style bg=color16,fg=color240
set -g window-status-current-style bg=color16,fg=color15,bright

set -g window-status-format "$char_inactive#{?window_bell_flag,#[fg=color166]$char_bell:#W,#{?window_zoomed_flag,$char_zoom:#W,#{?pane_synchronized,$char_zoom:#W,$name_window}}}"
set -g window-status-current-format "$char_active#{?window_zoomed_flag,$char_zoom:#W,#{?pane_synchronized,$char_sync:#W,$name_window}}"

set-hook -g pane-focus-in 'run-shell "tmux if -F \"#{==:#{window_panes},1}\" \"set-window-option synchronize-panes off\" \"\""'
set-option -g automatic-rename on
set-option -g automatic-rename-format "#{pane_current_command}"

set -g pane-border-indicators both
set -g pane-border-style fg=color240
set -g pane-active-border-style fg=color15
set -g display-panes-colour color240
set -g display-panes-active-colour color15
set-option -g clock-mode-colour color15

set -g escape-time 10
set -g repeat-time 1000
set -g history-limit 1000
set -g detach-on-destroy off

# keybindings
bind '#' display-panes

unbind q # prefix-q kills a pane with confirmation, killing also the window or session if it's the case
bind q if-shell -F "#{>:#{window_panes},1}" \
    "command-prompt -p 'Kill ###P? (Y/n)' kill-pane" \
    "if-shell -F '#{>:#{session_windows},1}' \
        \"command-prompt -p 'Last pane. Kill $name_window? (Y/n)' kill-pane\" \
        \"command-prompt -p 'Last pane and window. Kill $name_session? (Y/n)' kill-pane\""

unbind Q # prefix-Q kills a window with confirmation, killing also the session if it's the case
bind Q if-shell -F '#{>:#{session_windows},1}' \
    "command-prompt -p 'Kill $name_window? (Y/n)' kill-window" \
    "command-prompt -p 'Last window. Kill $name_session? (Y/n)' kill-window"

unbind C-q # C-q kills other panes
bind -n C-q if-shell -F '#{>:#{window_panes},1}' \
    "command-prompt -p 'Kill other panes than ###{pane_index}? (Y/n)' 'kill-pane -a'" \
    ""

unbind X
bind X detach-client

unbind x
bind x command-prompt -p "Detach this session? (Y/n)" detach-client

unbind K
bind K command-prompt -p "Kill the server? (Y/n)" kill-server

unbind w
bind w choose-tree -wZ -O name

unbind e
bind e choose-tree -sZ -O time

unbind s
bind s display-popup -h 50% -w 50% -E "session.sh"

unbind S
bind S command-prompt -p "New session name:" "run-shell 's_name=\"%%\"; tmux new-session -d -s \"\$s_name\" -c \"$HOME\"; tmux switch-client -t \"\$s_name\"'"

unbind -
unbind \\
bind - split-window -v -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"

unbind _ # shift -
unbind | # shift \\
bind _ split-window -fv -c "#{pane_current_path}"
bind | split-window -fh -c "#{pane_current_path}"

unbind Tab
bind Tab next-layout

bind \} swap-pane -U
bind \{ swap-pane -D
bind \< swap-window -t -1\; select-window -t -1
bind \> swap-window -t +1\; select-window -t +1

unbind C-s
bind -n C-s if-shell 'test $(tmux list-panes | wc -l) -gt 1' \
    'set-window-option synchronize-panes; display-message "Panes sync #{?pane_synchronized,on,off}"'

set -g mouse on
setw -g mode-keys vi

vim_pattern="(\\S+\\/)?g?(view|n?vim?x?|fzf)(diff)?(-wrapped)?" # don't change this
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +$vim_pattern$'"

# vim keys
unbind -n C-h
unbind -n C-j
unbind -n C-k
unbind -n C-l
bind -n "C-h" if-shell "$is_vim" "send C-h" "if-shell -F '#{pane_at_left}'   '' 'select-pane -L'"
bind -n "C-j" if-shell "$is_vim" "send C-j" "if-shell -F '#{pane_at_bottom}' '' 'select-pane -D'"
bind -n "C-k" if-shell "$is_vim" "send C-k" "if-shell -F '#{pane_at_top}'    '' 'select-pane -U'"
bind -n "C-l" if-shell "$is_vim" "send C-l" "if-shell -F '#{pane_at_right}'  '' 'select-pane -R'"
bind -T copy-mode-vi 'C-h' select-pane -L
bind -T copy-mode-vi 'C-j' select-pane -D
bind -T copy-mode-vi 'C-k' select-pane -U
bind -T copy-mode-vi 'C-l' select-pane -R
# bind -T copy-mode-vi 'C-\' select-pane -l

# visual copy mode
yank="xsel"
# bind -T copy-mode-vi M-Up       send -X scroll-up
# bind -T copy-mode-vi M-Down     send -X scroll-down
bind -T copy-mode-vi M-PageUp   send -X halfpage-up
bind -T copy-mode-vi M-PageDown send -X halfpage-down
bind -T copy-mode-vi PageUp     send -X page-up
bind -T copy-mode-vi PageDown   send -X page-down
bind -T copy-mode-vi v      send -X begin-selection
bind -T copy-mode-vi V      send -X select-line
bind -T copy-mode-vi C-v    send -X rectangle-toggle
bind -T copy-mode-vi y                  send -X copy-pipe-and-cancel "$yank"
bind -T copy-mode-vi Enter              send -X copy-pipe-and-cancel "$yank"
bind -T copy-mode-vi MouseDragEnd1Pane  send -X copy-pipe-and-cancel "$yank"
# paste
unbind ] # prevent accidental mistyping

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-processes '"~nvim->nvim *"'
set -g @continuum-restore 'off'

set -g @plugin 'jaclu/tmux-menus'
set -g @menus_trigger 'm'

set -g @plugin 'thewtex/tmux-mem-cpu-load' # mem and proc bar
set -g @plugin 'hendrikmi/tmux-cpu-mem-monitor' # battery
set -g @plugin 'gmoe/tmux-wifi' # <<<
set -g @tmux_wifi_icon_5 "󰤨 "
set -g @tmux_wifi_icon_4 "󰤥 "
set -g @tmux_wifi_icon_3 "󰤢 "
set -g @tmux_wifi_icon_2 "󰤟 "
set -g @tmux_wifi_icon_1 "󰤯 "
set -g @tmux_wifi_icon_off " " # >>>
set -g status-right "#{wifi_icon}#{wifi_ssid}    #($TMUX_PLUGIN_MANAGER_PATH/tmux-mem-cpu-load/tmux-mem-cpu-load -m2)    #{battery -p}"

# DON'T CHANGE BELOW THIS LINE #########################################################################################
tpm_install_dir="~/.config/tmux/plugins/tpm"
if "test ! -d $tpm_install_dir" \
   "run 'git clone https://github.com/tmux-plugins/tpm $tpm_install_dir && $tpm_install_dir/bin/install_plugins'"
run "$tpm_install_dir/tpm"
